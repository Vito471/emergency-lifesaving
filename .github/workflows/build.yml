name: "Build app"

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: mkdir -p www/images && cp index.html www/ && cp Images/*.png www/images/ 2>/dev/null || true
      - run: npm ci
      - run: npx cap sync android
      - name: Grant gradlew execute permission
        run: chmod +x android/gradlew
      - run: cd android && ./gradlew bundleRelease
      - uses: actions/upload-artifact@v4
        with:
          name: android-app
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error

  ios:
    name: Build iOS
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: mkdir -p www/images && cp index.html www/ && cp Images/*.png www/images/ 2>/dev/null || true
      - run: npm ci
      - run: npx cap sync ios
      - name: Build iOS (no sign — validation only)
        run: cd ios/App && xcodebuild -project App.xcodeproj -scheme App -configuration Release -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPhone 17 Pro' CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO build
