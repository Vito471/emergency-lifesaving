name: "Build app"

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: mkdir -p www/images && cp index.html www/ && cp Images/*.png www/images/ 2>/dev/null || true
      - run: npm ci
      - run: npx cap sync android
      - run: cd android && ./gradlew bundleRelease
      - uses: actions/upload-artifact@v4
        with:
          name: android-app
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error

  ios:
    name: Build iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: mkdir -p www/images && cp index.html www/ && cp Images/*.png www/images/ 2>/dev/null || true
      - run: npm ci
      - run: npx cap sync ios
      - run: cd ios/App && xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -archivePath build/App.xcarchive -allowProvisioningUpdates archive
      - run: cd ios/App && xcodebuild -exportArchive -archivePath build/App.xcarchive -exportPath build/App.ipa -exportOptionsPlist exportOptions.plist -allowProvisioningUpdates
      - uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: ios/App/build/App.ipa
          if-no-files-found: warn
